# Benchmark registry. provenance: official (third-party dataset + wrapped official
# scorer) | custom (we own GT + scorer; validation_doc REQUIRED — registry enforces).

benchmarks:
  olmocr_bench:
    adapter: "tbdoc.benches.official.olmocr_bench:OlmOCRBench"
    tier: A
    unit: page
    provenance: official
    source:
      hf_repo: allenai/olmOCR-bench
      revision: 54a96a6f
      license: odc-by
    scorer:
      kind: container                 # tbdoc-scorer-olmocr:v1 (full suite incl math/table);
      image: tbdoc-scorer-olmocr:v1   # falls back to isolated venv (render excluded)


  omnidocbench:
    adapter: "tbdoc.benches.official.omnidocbench:OmniDocBench"
    tier: A
    unit: page
    provenance: official
    source:
      hf_repo: opendatalab/OmniDocBench
      revision: d386947f              # "add v1.6" (2026-04-10); scorer code pinned in
                                      # benchmarks/_scorers/omnidocbench/requirements.txt
      license: unspecified            # VERIFIED 2026-07-07 — no license tag/field on the HF
                                      # dataset card; the eval-code repo is Apache-2.0
    scorer:
      kind: venv                      # official end2end pipeline (quick_match, Edit_dist+TEDS);
                                      # CDM excluded (needs TeX Live container) — flagged in output

  realdoc_qa:
    adapter: "tbdoc.benches.official.realdoc_qa:RealDocQA"
    tier: B
    unit: page
    provenance: official
    source:
      hf_repo: Extend-AI/RealDoc-Bench
      revision: 906170ab
      license: cc-by-4.0
    scorer:
      kind: native                  # field-aware EM + ANLS (deterministic, pure python)
      instrument: extractor         # frozen Qwen2.5-7B (see configs/models.yaml)

  merged_forms:
    adapter: "tbdoc.benches.custom.merged_forms:MergedFormsBench"
    tier: C
    unit: document
    provenance: custom
    validation_doc: benchmarks/custom/merged_forms/VALIDATION.md
    source:
      origin: "generated from NIST SD2 (public domain, US government work)"
      generator_seed: 0
    scorer:
      kind: native                  # PQ / boundary F1 / STP — deterministic, no LLM
