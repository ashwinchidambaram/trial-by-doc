# Which models × which benchmarks; run profiles.

run:
  results_dir: results/runs
  seeds: { sampling_seed: 0, temperature: 0 }
  budget: { max_usd_per_model: 10.0 }   # API guard; estimate-cost must not exceed

profiles:
  smoke:
    models: [qwen25vl, anthropic_vision]
    benchmarks: { olmocr_bench: 5 }
    max_samples: 5

  # v1 baseline: 8 local + 2 cheap APIs (keys required) + Tier-C floor baselines.
  # Per-bench caps sized for one RTX 5090 (stratified loaders make each cap representative).
  full:
    models: [olmocr2, qwen25vl, got2, dots_ocr, paddleocr_vl, deepseek_ocr,
             granite_docling, lightonocr, mistral_ocr, gemini_flash_lite]
    benchmarks:
      olmocr_bench: 100        # pages (stratified over 7 categories)
      omnidocbench: 100        # pages (stratified over 10 data sources)
      realdoc_qa: 100          # questions (~25 docs, stratified over 4 domains; page OCR memoized)
      merged_forms: 15         # streams (~17 pages each -> ~255 page inferences/model)

  tierc_floor:
    models: [baseline_every_page, baseline_no_boundary, baseline_pixel_diff]
    benchmarks: { merged_forms: 30 }
