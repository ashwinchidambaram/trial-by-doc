# Model registry — every entry: adapter dotted path + verified provenance.
# Local revisions/licenses verified against live HF model cards 2026-06-11 (ocparse S1)
# and re-checked at download. API pricing verified 2026-07-07 (see findings/).

models:
  # ---- local open-weights (GPU, vLLM/transformers) --------------------------
  olmocr2:
    kind: local
    adapter: "tbdoc.models.local.olmocr2:OlmOCR2Adapter"
    repo_id: allenai/olmOCR-2-7B-1025
    revision: e52d6f090b7a9007afffbbd6ce510876222fea93
    backend: vllm
    params: 7B
    license: apache-2.0
    commercial_use: true
    specialties: "purpose-built OCR (olmocr v4 prompt); strongest all-round parser in prior baseline"

  qwen25vl:
    kind: local
    adapter: "tbdoc.models.local.qwen25vl:Qwen25VLAdapter"
    repo_id: Qwen/Qwen2.5-VL-7B-Instruct
    revision: cc594898137f460bfe9f0759e9844b3ce807cfb5
    backend: vllm
    params: 7B
    license: apache-2.0
    commercial_use: true
    specialties: "general VLM; OCR via explicit markdown prompt; strong tables"

  got2:
    kind: local
    adapter: "tbdoc.models.local.got2:GotOcr2Adapter"
    repo_id: stepfun-ai/GOT-OCR-2.0-hf
    revision: d3017ef2c2c1395888c8d635c5e0508bcb0ac78d
    backend: transformers
    params: 580M
    license: apache-2.0
    commercial_use: true
    specialties: "small OCR specialist; markdown/LaTeX (format mode)"

  dots_ocr:
