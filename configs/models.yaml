  # ---- classic/CPU OCR engines (WS1; roster expansion Part A) ---------------
  tesseract:
    kind: cpu
    adapter: "tbdoc.models.local.tesseract:TesseractAdapter"
    # reference-host binary; on other machines the adapter falls back to `tesseract` on PATH
    tesseract_cmd: /home/ashwinc/micromamba/envs/tesseract-ocr/bin/tesseract
    params: "n/a"
    license: apache-2.0
    commercial_use: true
    specialties: "classic OCR engine; plain text; weak on tables/multi-column"
    # binary installed via micromamba (conda-forge, no sudo — apt-get was unavailable
    # without a password) 2026-07-09: tesseract 5.5.2. See findings/ for the verified
    # version + install method; docs/superpowers/specs/2026-07-09-roster-expansion-design.md
    # for the design.

  rapidocr:
    kind: cpu
    adapter: "tbdoc.models.local.rapidocr:RapidOCRAdapter"
    params: "n/a"
    license: apache-2.0
    commercial_use: true
    device: cpu
    longest_side: 2600
    specialties: "modern classic OCR (ONNXRuntime, PP-OCR-derived detector+recognizer); CPU-only — onnxruntime-gpu has no prebuilt wheel for this box's cu130/sm_120 (Blackwell) stack (verified 2026-07-09)"

  doctr:
    kind: cpu
    adapter: "tbdoc.models.local.doctr:DocTRAdapter"
    params: "n/a"
    license: apache-2.0
    commercial_use: true
    device: cpu
    longest_side: 2600
    specialties: "modern classic OCR (Mindee docTR, PyTorch two-stage det+reco); word-level boxes; device knob (cpu default, gpu via torch CUDA) for CPU-vs-GPU perf comparison"

  easyocr:
    kind: cpu
    adapter: "tbdoc.models.local.easyocr_engine:EasyOCRAdapter"
    params: "n/a"
    license: apache-2.0
    commercial_use: true
    device: gpu   # accuracy-run device = gpu: EasyOCR (CRAFT+CRNN) is impractical on CPU
                  # (~84 s/page, minutes on dense merged_forms pages) so the scored A4 run
                  # would crawl on cpu. Accuracy is device-invariant, so gpu changes only
                  # speed, not scores. The perf harness overrides device to measure BOTH
                  # cpu and gpu latency for the CPU-vs-GPU cost table (findings/ws1).
    longest_side: 2600
    specialties: "modern classic OCR (JaidedAI EasyOCR, PyTorch CRAFT+CRNN); line-level boxes; device knob (cpu default, gpu via torch CUDA) for CPU-vs-GPU perf comparison"

  # ---- Tier-C trivial baselines (scoreboard floor; no GPU/API/LLM) ----------
  baseline_every_page:
    kind: baseline
    adapter: "tbdoc.models.local.baselines:EveryPageBoundary"
    specialties: "floor: new doc at every page"
  baseline_no_boundary:
