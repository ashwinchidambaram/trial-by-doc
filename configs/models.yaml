  gemma4:
    kind: local
    adapter: "tbdoc.models.local.gemma4:Gemma4Adapter"
    repo_id: google/gemma-4-E4B-it
    revision: fee6332c1abaafb77f6f9624236c63aa2f1d0187   # verified live 2026-07-08 (HF API)
    backend: vllm
    params: 4.5B-eff   # 4.5B effective (8B with embeddings)
    license: apache-2.0                                   # verified live 2026-07-08 (card + API); note: departs from prior Gemma custom terms
