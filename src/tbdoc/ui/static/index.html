<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>trial-by-doc dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230B1E36'/%3E%3Ccircle cx='47' cy='19' r='4' fill='%23D4745E'/%3E%3Ctext x='32' y='40' fill='%23F4EFE6' font-family='sans-serif' font-weight='600' font-size='26' text-anchor='middle'%3EAC%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  /* Resolve theme before first paint (no flash). Only explicit choices are persisted;
     auto follows the OS. Themes: deepspace (dark), cosmic (light). */
  (function () {
    var mode = localStorage.getItem("ac-theme") || "auto";
    var dark = mode === "dark" || (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.setAttribute("data-theme", dark ? "deepspace" : "cosmic");
    window.__acThemeMode = mode;
  })();
</script>
<style>
  /* ── AC brand tokens (inlined from ac-brand @ 9266c82; source of record:
        src/tbdoc/ui/static/ac-tokens.css) ── */
  :root {
    --ac-navy:#0B1E36; --ac-navy-deep:#050E1C; --ac-terracotta:#D4745E;
    --ac-sage:#8B9D83; --ac-gold:#D4A574; --ac-cream:#F4EFE6;
    --ac-font-display:'Space Grotesk','Inter',sans-serif;
    --ac-font-ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --ac-font-mono:'JetBrains Mono','Fira Code',monospace;
    --ac-space-xs:4px; --ac-space-sm:8px; --ac-space-md:16px; --ac-space-lg:24px;
    --ac-space-xl:32px; --ac-space-2xl:48px; --ac-space-3xl:64px;
    --ac-radius-sm:6px; --ac-radius-md:8px; --ac-radius-lg:12px; --ac-radius-xl:16px; --ac-radius-pill:999px;
    --ac-dur-micro:150ms; --ac-dur-fast:200ms; --ac-dur-normal:250ms;
    --ac-ease-standard:cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="deepspace"], :root {
    --ac-bg:#0B1E36; --ac-bg-alt:#050E1C; --ac-surface:#13294A; --ac-surface-alt:#1B3A5C;
    --ac-text:#F4EFE6; --ac-text-sec:#BDC8D4; --ac-text-ter:#8FB4D8;
    --ac-border:#2E5E8E; --ac-border-subtle:rgba(189,200,212,0.14);
    --ac-accent:#D4745E; --ac-accent-hover:#E18C73; --ac-accent-text:#D4745E;
    --ac-secondary-text:#8B9D83; --ac-highlight-text:#D4A574; --ac-on-accent:#0B1E36;
    --ac-danger:#E0726C; --ac-danger-bg:#3D1F1E;
    --ac-glass:rgba(11,30,54,0.62); --ac-glass-border:rgba(143,180,216,0.18);
    --ac-shadow-sm:0 2px 10px rgba(0,0,0,0.30); --ac-shadow-hover:0 16px 44px rgba(0,0,0,0.55);
  }
  [data-theme="cosmic"] {
    --ac-bg:#F4EFE6; --ac-bg-alt:#E8DFCC; --ac-surface:#FDFCFB; --ac-surface-alt:#F9F5EC;
    --ac-text:#0B1E36; --ac-text-sec:#2E5E8E; --ac-text-ter:#5E5440;
    --ac-border:#D9CDB0; --ac-border-subtle:#E8DFCC;
    --ac-accent:#D4745E; --ac-accent-hover:#C4624D; --ac-accent-text:#A84F3B;
    --ac-secondary-text:#5D6A53; --ac-highlight-text:#A57548; --ac-on-accent:#0B1E36;
    --ac-danger:#D85650; --ac-danger-bg:#FDF0EF;
    --ac-glass:rgba(253,252,251,0.72); --ac-glass-border:rgba(217,205,176,0.6);
    --ac-shadow-sm:0 2px 10px rgba(11,30,54,0.05); --ac-shadow-hover:0 16px 44px rgba(11,30,54,0.16);
  }

  /* ── App ── */
  * { box-sizing: border-box; }
  body { margin:0; font-family:var(--ac-font-ui); background:var(--ac-bg); color:var(--ac-text);
         font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  a { color:var(--ac-accent-text); }
  .mono { font-family:var(--ac-font-mono); }
  .muted { color:var(--ac-text-sec); }
  .icon { width:1em; height:1em; fill:none; stroke:currentColor; stroke-width:1.6;
          stroke-linecap:round; stroke-linejoin:round; vertical-align:-0.12em; }

  header { display:flex; align-items:center; gap:var(--ac-space-lg);
           padding:var(--ac-space-sm) var(--ac-space-lg);
           border-bottom:1px solid var(--ac-glass-border);
           background:var(--ac-glass); backdrop-filter:blur(12px);
           position:sticky; top:0; z-index:20; }
  header .wordmark { font-family:var(--ac-font-display); font-weight:500; font-size:1rem;
                     letter-spacing:-0.01em; white-space:nowrap; }
  header .wordmark .dot { color:var(--ac-accent); }
  header nav { display:flex; gap:var(--ac-space-xs); }
  header nav a { color:var(--ac-text-sec); text-decoration:none; padding:0.35rem 0.7rem;
                 border-radius:var(--ac-radius-md); font-size:0.85rem; font-weight:500;
                 transition:background var(--ac-dur-micro) var(--ac-ease-standard); }
  header nav a:hover { color:var(--ac-text); background:var(--ac-surface); }
  header nav a.active { color:var(--ac-text); background:var(--ac-surface); }
  header .right { margin-left:auto; display:flex; align-items:center; gap:var(--ac-space-md); }

  select, input, button { font-family:var(--ac-font-ui); background:var(--ac-surface);
    color:var(--ac-text); border:1px solid var(--ac-border-subtle);
    border-radius:var(--ac-radius-md); padding:0.35rem 0.55rem; font-size:0.85rem; }
  button { cursor:pointer; transition:border-color var(--ac-dur-micro), background var(--ac-dur-micro); }
  button:hover:not(:disabled) { border-color:var(--ac-accent); }
  button:disabled { opacity:0.45; cursor:not-allowed; }
  :focus-visible { outline:2px solid var(--ac-accent); outline-offset:2px; }
  .chip { border-radius:var(--ac-radius-sm); padding:0.25rem 0.6rem; font-size:0.78rem;
          background:var(--ac-surface); border:1px solid var(--ac-border-subtle); color:var(--ac-text-sec); }
  .chip[aria-pressed="true"] { color:var(--ac-on-accent); background:var(--ac-accent); border-color:var(--ac-accent); }
  .iconbtn { display:inline-flex; align-items:center; gap:0.3rem; }

  main { padding:var(--ac-space-lg) var(--ac-space-xl); max-width:1560px; margin:0 auto; }
  h2 { font-family:var(--ac-font-display); font-weight:500; font-size:1.2rem; margin:0 0 var(--ac-space-md); }
  h3 { font-family:var(--ac-font-display); font-weight:500; font-size:1rem; margin:0 0 var(--ac-space-sm); }

  .badge { display:inline-block; padding:0.05rem 0.4rem; border-radius:var(--ac-radius-sm);
           font-size:0.7rem; background:var(--ac-surface); color:var(--ac-text-sec);
           border:1px solid var(--ac-border-subtle); margin-right:0.25rem; font-family:var(--ac-font-ui); }
  .badge.tier-A { color:var(--ac-text-ter); } .badge.tier-B { color:var(--ac-highlight-text); }
  .badge.tier-C { color:var(--ac-accent-text); }

  table { border-collapse:collapse; width:100%; font-size:0.82rem; }
  th, td { border-bottom:1px solid var(--ac-border-subtle); padding:0.45rem 0.6rem; text-align:right; white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; }
  thead th { position:sticky; top:49px; background:var(--ac-bg); z-index:5;
             font-family:var(--ac-font-ui); font-weight:600; font-size:0.68rem;
             text-transform:uppercase; letter-spacing:0.05em; color:var(--ac-text-sec);
             cursor:pointer; user-select:none; }
  thead th:hover { color:var(--ac-accent); }
  tbody td { font-family:var(--ac-font-mono); }
  tbody td:first-child { font-family:var(--ac-font-ui); }
  tr.interactive:hover td { background:var(--ac-surface-alt); }
  td.cell { cursor:pointer; position:relative; }
  .lead { position:relative; }
  .lead::before { content:""; position:absolute; left:0.15rem; top:50%; transform:translateY(-50%);
                  width:5px; height:5px; border-radius:50%; background:var(--ac-highlight-text); }
  .frontier-dot { display:inline-block; width:6px; height:6px; border-radius:50%;
                  background:var(--ac-accent); margin-right:0.35rem; vertical-align:0.05em; }
  .warn { color:var(--ac-accent-text); }
  .n { color:var(--ac-text-ter); font-size:0.7rem; }

  .toolbar { display:flex; gap:var(--ac-space-md); align-items:center; flex-wrap:wrap; margin-bottom:var(--ac-space-md); }
  .toolbar label { color:var(--ac-text-sec); font-size:0.78rem; }
  .panel { background:var(--ac-surface); border:1px solid var(--ac-border-subtle);
           border-radius:var(--ac-radius-lg); padding:var(--ac-space-md); box-shadow:var(--ac-shadow-sm); }
  .split { display:grid; grid-template-columns:1fr 1fr; gap:var(--ac-space-lg); align-items:start; }
  .cockpit-viz { display:grid; grid-template-columns:1fr; gap:var(--ac-space-lg); margin-top:var(--ac-space-lg); }
  pre { white-space:pre-wrap; word-break:break-word; background:var(--ac-bg-alt);
        border:1px solid var(--ac-border-subtle); border-radius:var(--ac-radius-md);
        padding:0.6rem; max-height:460px; overflow:auto; font-size:0.76rem;
        font-family:var(--ac-font-mono); }
  .md-render { max-height:460px; overflow:auto; font-size:0.82rem; }
  .md-render table { font-size:0.76rem; margin:0.4rem 0; }
  .md-render th, .md-render td { border:1px solid var(--ac-border-subtle); padding:0.25rem 0.4rem; text-align:left; }
  .md-render h1,.md-render h2,.md-render h3 { font-family:var(--ac-font-display); margin:0.5rem 0 0.3rem; }
  .hit { background:color-mix(in srgb, var(--ac-secondary-text) 30%, transparent);
         border-radius:3px; padding:0 2px; }
  .miss-chip { display:inline-block; color:var(--ac-danger); border:1px solid var(--ac-danger);
               background:var(--ac-danger-bg); border-radius:var(--ac-radius-sm);
               padding:0.05rem 0.4rem; font-size:0.72rem; margin:0.15rem 0; }
  .pass { color:var(--ac-secondary-text); } .fail { color:var(--ac-danger); }

  .popover { position:absolute; z-index:30; background:var(--ac-surface);
             border:1px solid var(--ac-border); border-radius:var(--ac-radius-lg);
             box-shadow:var(--ac-shadow-hover); padding:var(--ac-space-md); max-width:420px;
             font-size:0.78rem; }
  .popover dl { display:grid; grid-template-columns:auto 1fr; gap:0.25rem 0.75rem; margin:0; }
  .popover dt { color:var(--ac-text-sec); } .popover dd { margin:0; font-family:var(--ac-font-mono); word-break:break-all; }

  .empty { color:var(--ac-text-sec); padding:var(--ac-space-3xl) 0; text-align:center; }
  .empty h3 { color:var(--ac-text); }
  .note { font-size:0.74rem; color:var(--ac-text-sec); margin-top:0.4rem; font-style:italic; }

  .gallery { display:flex; gap:0.3rem; flex-wrap:wrap; }
  .gallery img { width:44px; height:44px; object-fit:cover; border-radius:var(--ac-radius-sm);
                 border:1px solid var(--ac-border-subtle); }
  .zoomimg { max-width:100%; border-radius:var(--ac-radius-md); border:1px solid var(--ac-border-subtle);
             cursor:zoom-in; }
  .zoomimg.zoomed { cursor:zoom-out; position:relative; }

  footer { border-top:1px solid var(--ac-border-subtle); margin-top:var(--ac-space-3xl);
           padding:var(--ac-space-lg) var(--ac-space-xl); display:flex; align-items:center;
           gap:var(--ac-space-sm); color:var(--ac-text-sec); font-size:0.74rem; }
  footer .byline { line-height:1.15; }
  footer .byline .lbl { text-transform:uppercase; letter-spacing:0.12em; font-size:0.6rem; color:var(--ac-text-ter); }
  footer .byline .name { font-family:var(--ac-font-display); color:var(--ac-text-sec); }
  footer svg { width:26px; height:26px; }

  @media (max-width: 900px) { .split { grid-template-columns:1fr; } }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<!-- icon sprite (single family, 16px viewBox) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-check" viewBox="0 0 16 16"><path d="M3 8.5l3 3 7-7"/></symbol>
  <symbol id="i-x" viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8"/></symbol>
  <symbol id="i-warn" viewBox="0 0 16 16"><path d="M8 2l6 11H2z"/><path d="M8 6.5v3M8 11.2v.01"/></symbol>
  <symbol id="i-info" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.3"/><path d="M8 7.2v4M8 5v.01"/></symbol>
  <symbol id="i-ext" viewBox="0 0 16 16"><path d="M9 3h4v4M13 3l-6 6M11 9v4H3V5h4"/></symbol>
  <symbol id="i-star" viewBox="0 0 16 16"><path d="M8 2l1.8 3.9 4.2.5-3.1 2.9.8 4.2L8 11.9 4.3 13.4l.8-4.2L2 6.4l4.2-.5z"/></symbol>
</svg>

<header>
  <span class="wordmark">trial-by-doc<span class="dot">.</span></span>
  <nav id="nav">
    <a href="#/" data-route="/">Leaderboard</a>
    <a href="#/benches" data-route="/benches">Benchmarks</a>
    <a href="#/example" data-route="/example">Example review</a>
  </nav>
  <div class="right">
    <span class="muted" style="font-size:0.78rem">run</span>
    <select id="run-select" aria-label="run"></select>
    <button id="verify-btn" class="iconbtn" aria-label="run provenance" title="reproducibility fingerprint">
      <svg class="icon"><use href="#i-info"/></svg></button>
    <button id="theme-btn" class="iconbtn" aria-label="theme" title="theme: auto / light / dark"></button>
  </div>
</header>
<main id="app"></main>
<footer>
  <span id="byline-mark" aria-hidden="true"></span>
  <span class="byline"><span class="lbl">Built by</span><br><span class="name">Ashwin Chidambaram</span></span>
</footer>

<script>
"use strict";
const state = { runId:null, runs:[], prov:null };
const ICON_DARK = `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="30.72" fill="#0B1E36"/><ellipse cx="32" cy="32" rx="22.72" ry="11.39" fill="none" stroke="#F4EFE6" stroke-width="1.41" opacity="0.5" transform="rotate(-22 32 32)"/><text x="32" y="32.77" fill="#F4EFE6" font-family="'Space Grotesk','Inter',sans-serif" font-weight="500" font-size="25.6" letter-spacing="-0.64" text-anchor="middle" dominant-baseline="middle">AC</text><circle cx="46.98" cy="19.01" r="3.2" fill="#D4745E"/></svg>`;
const ICON_LIGHT = ICON_DARK.replace(/#0B1E36/g,'__N__').replace(/#F4EFE6/g,'#0B1E36').replace(/__N__/g,'#F4EFE6');

// ── helpers ──
async function jget(url){ const r=await fetch(url,{cache:"no-store"}); if(!r.ok){let b="";try{b=JSON.stringify(await r.json())}catch(e){} throw new Error(`${r.status} ${r.statusText} ${b}`);} return r.json(); }
function qs(p){ const u=new URLSearchParams(); for(const[k,v]of Object.entries(p)) if(v!==undefined&&v!==null&&v!=="") u.set(k,v); return u.toString(); }
function parseHash(){ const h=location.hash.replace(/^#/,"")||"/"; const[path,query]=h.split("?"); return {path:path||"/", params:Object.fromEntries(new URLSearchParams(query||""))}; }
function el(tag,attrs={},kids=[]){ const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){ if(k==="text")e.textContent=v; else if(k==="html")e.innerHTML=v; else if(k.startsWith("on"))e.addEventListener(k.slice(2),v); else if(v!==null&&v!==undefined)e.setAttribute(k,v); }
  for(const c of[].concat(kids)) if(c!==null&&c!==undefined) e.appendChild(typeof c==="string"?document.createTextNode(c):c); return e; }
function icon(id,cls){ const s=document.createElementNS("http://www.w3.org/2000/svg","svg"); s.setAttribute("class","icon "+(cls||"")); const u=document.createElementNS("http://www.w3.org/2000/svg","use"); u.setAttribute("href","#"+id); s.appendChild(u); return s; }
function fmt(v,d=3){ return (v===null||v===undefined)?"—":(typeof v==="number"?v.toFixed(d):String(v)); }

// ── theme ──
function applyTheme(){ const mode=window.__acThemeMode||"auto";
  const dark = mode==="dark" || (mode==="auto" && matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.setAttribute("data-theme", dark?"deepspace":"cosmic");
  document.getElementById("byline-mark").innerHTML = dark?ICON_DARK:ICON_LIGHT;
  const label = {auto:"Auto",light:"Light",dark:"Dark"}[mode];
  document.getElementById("theme-btn").innerHTML = `<svg class="icon"><use href="#i-star"/></svg> ${label}`;
}
function cycleTheme(){ const order=["auto","light","dark"]; const cur=window.__acThemeMode||"auto";
  const next=order[(order.indexOf(cur)+1)%order.length]; window.__acThemeMode=next;
  if(next==="auto") localStorage.removeItem("ac-theme"); else localStorage.setItem("ac-theme",next);
  applyTheme(); }
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{ if((window.__acThemeMode||"auto")==="auto") applyTheme(); });

// ── runs + provenance ──
async function loadRuns(){ state.runs=await jget("/api/runs");
  const sel=document.getElementById("run-select"); sel.innerHTML="";
  for(const r of state.runs) sel.appendChild(el("option",{value:r.run_id,text:`${r.run_id} (${r.n_scored})`}));
  const {params}=parseHash(); state.runId=params.run_id||(state.runs[0]&&state.runs[0].run_id)||null;
  sel.value=state.runId||""; sel.addEventListener("change",()=>{ state.runId=sel.value; route(); });
}
async function showProvenance(){ const existing=document.querySelector(".popover"); if(existing){existing.remove();return;}
  let p; try{ p=await jget(`/api/provenance?${qs({run_id:state.runId})}`);}catch(e){return;}
  const gpu=(p.hardware&&p.hardware.gpu)||{};
  const dl=el("dl");
  const add=(k,v)=>{ dl.appendChild(el("dt",{text:k})); dl.appendChild(el("dd",{text:v})); };
  add("run",p.run_id||"—"); add("created",p.created_at||"—");
  add("gpu",`${gpu.name||"?"} (${gpu.arch||"?"})`); add("driver/cuda",`${gpu.driver_version||"?"}`);
  add("git",`${(p.git_sha||"?").slice(0,10)}${p.git_dirty?" (dirty)":""}`);
  add("python",p.python||"—"); add("seeds",JSON.stringify(p.seeds)||"—");
  add("models",`${Object.keys(p.models||{}).length} pinned revisions`);
  const pop=el("div",{class:"popover"},[el("h3",{text:"reproducibility"}),dl]);
  pop.style.top="52px"; pop.style.right="var(--ac-space-lg)";
  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener("click",function h(e){ if(!pop.contains(e.target)){pop.remove();document.removeEventListener("click",h);} }),0);
}

// ── join cockpit data ──
function meanAcc(row,benchKeys){ const vs=benchKeys.map(b=>row.cells[b]).filter(v=>v!=null); return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null; }
function bestCost(model,cost){
  const classic=cost.classic.filter(r=>r.engine===model).map(r=>r.usd_per_1k);
  if(classic.length) return Math.min(...classic);
  const sh=cost.self_host.find(r=>r.model===model);
  if(sh) return sh.usd_per_1k_batched!=null?sh.usd_per_1k_batched:sh.usd_per_1k_single;
  return null;
}
function computeFrontier(rows){ // maximize acc, minimize cost + speed
  const cand=rows.filter(r=>r.acc!=null&&r.cost!=null&&r.speed!=null);
  return new Set(cand.filter(r=>!cand.some(o=>o!==r && o.acc>=r.acc && o.cost<=r.cost && o.speed<=r.speed &&
        (o.acc>r.acc||o.cost<r.cost||o.speed<r.speed))).map(r=>r.model));
}

// ── Leaderboard / cockpit ──
async function renderCockpit(root){
  if(!state.runId){ root.appendChild(emptyState("no scored runs found","Run the gauntlet, then reload.")); return; }
  const [sb,perf,cost,rob] = await Promise.all([
    jget(`/api/scoreboard?${qs({run_id:state.runId})}`),
    jget(`/api/perf?${qs({run_id:state.runId})}`),
    jget(`/api/cost`),
    jget(`/api/robustness?${qs({run_id:state.runId})}`),
  ]);
  const perfBy=Object.fromEntries(perf.map(r=>[r.model,r]));
  const robBy=Object.fromEntries(rob.map(r=>[r.model,r]));
  const benchKeys=sb.benches;
  // per-model joined row
  const rows=sb.models.map(m=>{
    const cells=Object.fromEntries(benchKeys.map(b=>[b,(sb.cells[`${m}|${b}`]||{}).mean]));
    const pf=perfBy[m]||{}; const rb=robBy[m]||{};
    const r={model:m,cells,speed:pf.median_s??null,vram:pf.peak_vram_gb??null,
             cost:bestCost(m,cost),retained:rb.retained_pct??null};
    r.acc=meanAcc(r,benchKeys); return r;
  });
  const frontier=computeFrontier(rows);
  // column min/max for heatmap
  const colRange={}; for(const b of benchKeys){ const vs=rows.map(r=>r.cells[b]).filter(v=>v!=null); colRange[b]=[Math.min(...vs),Math.max(...vs)]; }
  const bestAcc=rows.reduce((a,r)=>(r.acc!=null&&(a==null||r.acc>a.acc))?r:a,null);

  root.appendChild(el("h2",{text:`Leaderboard: ${sb.run_id}`}));
  root.appendChild(el("div",{class:"muted",style:"margin:-8px 0 12px;font-size:0.8rem",
    text:`${sb.n_scored} scored samples. Accuracy shaded per column (deeper is stronger); a gold dot marks the column leader, a terracotta dot marks models on the value frontier.`}));

  // toolbar

// mini markdown renderer (headings, tables, lists, bold, code) with gold-hit highlight
function esc(s){ return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function hi(line,golds){ let out=esc(line);
  for(const g of golds){ if(!g) continue; const e=esc(String(g)); const idx=out.toLowerCase().indexOf(e.toLowerCase());
    if(idx>=0) out=out.slice(0,idx)+`<span class="hit">`+out.slice(idx,idx+e.length)+`</span>`+out.slice(idx+e.length); }
  return out.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>"); }
function renderMarkdown(md,golds){ if(!md) return "<span class='muted'>(no prediction)</span>";
  const lines=md.split("\n"); let html=""; let i=0;
  while(i<lines.length){ const ln=lines[i];
    if(/^\s*\|.*\|/.test(ln)&&i+1<lines.length&&/^\s*\|?[\s:-]+\|/.test(lines[i+1])){
      const rows=[]; while(i<lines.length&&/\|/.test(lines[i])){ rows.push(lines[i]); i++; }
      html+="<table>"; rows.forEach((r,ri)=>{ if(ri===1)return; const cells=r.split("|").slice(1,-1);
        html+="<tr>"+cells.map(c=>`<${ri===0?"th":"td"}>${hi(c.trim(),golds)}</${ri===0?"th":"td"}>`).join("")+"</tr>"; });
      html+="</table>"; continue; }
    const h=ln.match(/^(#{1,4})\s+(.*)/); if(h){ const n=h[1].length; html+=`<h${n}>${hi(h[2],golds)}</h${n}>`; i++; continue; }
    const li=ln.match(/^\s*[-*]\s+(.*)/); if(li){ html+=`<div>• ${hi(li[1],golds)}</div>`; i++; continue; }
    if(ln.trim()===""){ html+="<div style='height:6px'></div>"; i++; continue; }
    html+=`<div>${hi(ln,golds)}</div>`; i++;
  }

}

  if(p==null) return `(kind=${pred.kind}, no body${pred.error?": "+pred.error:""})`;
  if(Array.isArray(p)) return p.map((x,i)=>`--- page ${i} ---\n${x.markdown||JSON.stringify(x)}`).join("\n\n");
  if(typeof p==="object") return p.markdown!=null?p.markdown:JSON.stringify(p,null,2);
  return String(p); }
function renderGold(gold){ const box=el("div",{class:"panel"});
  if(gold.kind==="qa"){ box.appendChild(el("div",{},[el("b",{text:"question: "}),gold.question||"?"]));
    box.appendChild(el("div",{},[el("b",{text:"accepted answers: "}),(gold.answers||[]).join("  |  ")])); }
  else if(gold.kind==="unit_tests"){ if(!gold.tests.length) box.appendChild(el("div",{class:"muted",text:"(no matching tests)"}));
    for(const t of gold.tests){ const row=el("div",{style:"display:flex;gap:6px;align-items:baseline;padding:2px 0;border-bottom:1px dashed var(--ac-border-subtle)"});
      row.appendChild(icon(t.passed===false?"i-x":"i-check",t.passed===false?"fail":"pass"));
      row.appendChild(el("span",{class:"n",text:t.type})); row.appendChild(document.createTextNode(t.assertion||""));
      if(t.fail_reason) row.appendChild(el("span",{class:"muted",text:" — "+t.fail_reason})); box.appendChild(row); } }
  else if(gold.kind==="segmentation"){ box.appendChild(el("div",{text:`gold boundaries: [${(gold.boundaries||[]).join(", ")}] over ${gold.n_pages} pages`})); }
  else if(gold.kind==="page_annotation"){ box.appendChild(el("pre",{text:gold.reconstructed_text||"(none matched)"})); }
  else box.appendChild(el("pre",{text:JSON.stringify(gold,null,2)}));
  if(gold.note) box.appendChild(el("div",{class:"note",text:gold.note}));
  return box; }

// ── router ──
async function route(){ const {path,params}=parseHash();
  for(const a of document.querySelectorAll("#nav a")) a.classList.toggle("active",a.dataset.route===path);
  const root=document.getElementById("app"); root.innerHTML="";
  try{ if(path==="/benches") await renderBenches(root);
    else if(path==="/example") await renderExample(root,params);
    else await renderCockpit(root); }
  catch(e){ root.appendChild(emptyState("something went wrong",e.message)); }
}
window.addEventListener("hashchange",route);
document.getElementById("theme-btn").addEventListener("click",cycleTheme);
document.getElementById("verify-btn").addEventListener("click",showProvenance);
(async function init(){ applyTheme(); await loadRuns(); route(); })();
</script>
