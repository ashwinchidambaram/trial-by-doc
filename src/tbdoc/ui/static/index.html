<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>trial-by-doc — results dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2f3a; --text: #e6e8ec; --muted: #8b93a3;
    --accent: #5b9dff; --good: #3fbf6a; --bad: #e5534b; --warn: #d9a441;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }
  header { display: flex; align-items: center; gap: 1.5rem; padding: 0.75rem 1.25rem;
           border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { font-size: 1rem; margin: 0; font-weight: 600; white-space: nowrap; }
  header nav { display: flex; gap: 0.25rem; }
  header nav a { color: var(--muted); text-decoration: none; padding: 0.35rem 0.7rem; border-radius: 6px; font-size: 0.85rem; }
  header nav a.active { color: var(--text); background: #232733; }
  header .runsel { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }
  select, input { background: #1b1f28; color: var(--text); border: 1px solid var(--border); border-radius: 6px;
                  padding: 0.3rem 0.5rem; font-size: 0.85rem; }
  main { padding: 1.25rem; max-width: 1400px; margin: 0 auto; }
  h2 { font-size: 1.05rem; margin: 0 0 0.75rem; }
  .muted { color: var(--muted); }
  .badge { display: inline-block; padding: 0.05rem 0.4rem; border-radius: 4px; font-size: 0.72rem;
           background: #232733; color: var(--muted); border: 1px solid var(--border); margin-right: 0.25rem; }
  .badge.tier-A { color: #7fd0ff; } .badge.tier-B { color: #ffd27f; } .badge.tier-C { color: #ff9fd0; }
  table { border-collapse: collapse; width: 100%; font-size: 0.83rem; }
  th, td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; white-space: nowrap; }
  th { background: var(--panel); cursor: pointer; user-select: none; position: sticky; top: 48px; }
  th:hover { color: var(--accent); }
  td.cell { cursor: pointer; }
  td.cell:hover { background: #1c2130; }
  .n { color: var(--muted); font-size: 0.72rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.9rem; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem; }
  .card h3 { margin: 0 0 0.4rem; font-size: 0.95rem; }
  .card .gallery { display: flex; gap: 0.3rem; margin-top: 0.5rem; flex-wrap: wrap; }
  .card .gallery img { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
  .gated { font-size: 0.75rem; color: var(--warn); background: #221c11; border: 1px solid #3a2f18;
           border-radius: 6px; padding: 0.4rem 0.6rem; margin-top: 0.5rem; }
  .picker { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .picker label { color: var(--muted); font-size: 0.78rem; margin-right: 0.25rem; }
  .example-grid { display: grid; grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.3fr); gap: 1rem; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem; }
  .panel img { max-width: 100%; border-radius: 4px; border: 1px solid var(--border); }
  pre { white-space: pre-wrap; word-break: break-word; background: #0c0e12; border: 1px solid var(--border);
        border-radius: 6px; padding: 0.6rem; max-height: 420px; overflow: auto; font-size: 0.78rem; }
  .metrics-table td, .metrics-table th { white-space: normal; }
  .pass { color: var(--good); } .fail { color: var(--bad); }
  .test-row { display: flex; gap: 0.4rem; align-items: baseline; padding: 0.15rem 0; border-bottom: 1px dashed var(--border); }
  .test-row .tag { font-family: ui-monospace, monospace; color: var(--muted); font-size: 0.72rem; }
  .empty { color: var(--muted); padding: 2rem 0; text-align: center; }
  .note { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; font-style: italic; }
  .qa-row { margin-bottom: 0.4rem; }
  .qa-row b { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>trial-by-doc dashboard</h1>
  <nav id="nav">
    <a href="#/" data-route="/">Leaderboard</a>
    <a href="#/benches" data-route="/benches">Benchmarks</a>
    <a href="#/example" data-route="/example">Example review</a>
  </nav>
  <div class="runsel">
    <label for="run-select">run</label>
    <select id="run-select"></select>
  </div>
</header>
<main id="app"></main>

<script>
"use strict";

const state = { runId: null, runs: [] };

async function jget(url) {
  const r = await fetch(url);
  if (!r.ok) {
    let body = "";
    try { body = JSON.stringify(await r.json()); } catch (e) {}
    throw new Error(`${r.status} ${r.statusText} ${body}`);
  }
  return r.json();
}

function qs(params) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) if (v !== undefined && v !== null && v !== "") p.set(k, v);
  return p.toString();
}

function parseHash() {
  const h = location.hash.replace(/^#/, "") || "/";
  const [path, query] = h.split("?");
  const params = Object.fromEntries(new URLSearchParams(query || ""));
  return { path: path || "/", params };
}

function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "text") e.textContent = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of [].concat(children)) if (c) e.appendChild(c);
  return e;
}

async function loadRuns() {
  state.runs = await jget("/api/runs");
  const sel = document.getElementById("run-select");
  sel.innerHTML = "";
  for (const r of state.runs) {
    const opt = el("option", { value: r.run_id, text: `${r.run_id} (${r.n_scored})` });
    sel.appendChild(opt);
  }
  const { params } = parseHash();
  state.runId = params.run_id || (state.runs[0] && state.runs[0].run_id) || null;
  sel.value = state.runId || "";
  sel.addEventListener("change", () => {
    state.runId = sel.value;
    route();
  });
}

// ---- Leaderboard ------------------------------------------------------------

async function renderLeaderboard(root) {
  if (!state.runId) { root.appendChild(el("div", { class: "empty", text: "no scored runs found" })); return; }
  const data = await jget(`/api/scoreboard?${qs({ run_id: state.runId })}`);
  root.appendChild(el("h2", { text: `Leaderboard — ${data.run_id} (${data.n_scored} scored samples)` }));

  const catPicker = el("div", { class: "picker" }, [
    el("label", { text: "per-category breakdown for bench:" }),
    (() => {
      const s = el("select", { id: "cat-bench" });
      s.appendChild(el("option", { value: "", text: "(none)" }));
      for (const b of data.benches) s.appendChild(el("option", { value: b, text: b }));
      return s;
    })(),
  ]);
  root.appendChild(catPicker);

  const table = el("table");
  let sortState = { col: null, dir: 1 };
  function draw() {
    table.innerHTML = "";
    const header = el("tr", {}, [
      el("th", { text: "model", onclick: () => { sortState = { col: "model", dir: sortState.dir * -1 }; draw(); } }),
      ...data.benches.map(b => {
        const meta = data.bench_meta[b] || {};
        const th = el("th", {
          onclick: () => { sortState = { col: b, dir: (sortState.col === b ? sortState.dir * -1 : -1) }; draw(); },
        });
        th.appendChild(document.createTextNode(b + " "));
        th.appendChild(el("span", { class: `badge tier-${meta.tier}`, text: `T${meta.tier || "?"}` }));
        th.appendChild(el("span", { class: "badge", text: meta.provenance || "?" }));
        th.appendChild(el("span", { class: "badge", text: meta.license || "no license tag" }));
        return th;
      }),
    ]);
    table.appendChild(header);

    let rows = data.models.slice();
    if (sortState.col) {
      rows.sort((a, b) => {
        const va = sortState.col === "model" ? a : (data.cells[`${a}|${sortState.col}`] || {}).mean;
        const vb = sortState.col === "model" ? b : (data.cells[`${b}|${sortState.col}`] || {}).mean;
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;
        if (sortState.col === "model") return sortState.dir * String(va).localeCompare(String(vb));
        return sortState.dir * (vb - va);
      });
    }
    for (const m of rows) {
      const tr = el("tr", {}, [el("td", { text: m })]);
      for (const b of data.benches) {
        const c = data.cells[`${m}|${b}`] || { mean: null, n: 0 };
        const td = el("td", { class: "cell" });
        td.appendChild(document.createTextNode(c.mean == null ? "—" : c.mean.toFixed(3)));
        if (c.n) td.appendChild(el("span", { class: "n", text: ` (n=${c.n})` }));
        td.addEventListener("click", () => openExample(m, b));
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }
  }
  draw();
  root.appendChild(table);

  const catBox = el("div", { id: "cat-box", style: "margin-top:1.5rem;" });
  root.appendChild(catBox);
  document.getElementById("cat-bench").addEventListener("change", (ev) => {
    catBox.innerHTML = "";
    const b = ev.target.value;
    if (!b) return;
    const cats = new Set();
    for (const m of data.models) for (const c of Object.keys(data.categories[`${m}|${b}`] || {})) cats.add(c);
    const catList = [...cats].sort();
    if (!catList.length) { catBox.appendChild(el("div", { class: "muted", text: "no per-category data" })); return; }
    const t = el("table");
    t.appendChild(el("tr", {}, [el("th", { text: "model" }), ...catList.map(c => el("th", { text: c }))]));
    for (const m of data.models) {
      const row = data.categories[`${m}|${b}`] || {};
      t.appendChild(el("tr", {}, [
        el("td", { text: m }),
        ...catList.map(c => el("td", { text: row[c] && row[c].mean != null ? row[c].mean.toFixed(3) : "—" })),
      ]));
    }
    catBox.appendChild(el("h2", { text: `${b} by category` }));
    catBox.appendChild(t);
  });
}

function openExample(model, bench) {
  location.hash = `#/example?${qs({ run_id: state.runId, model, bench })}`;
}

// ---- Benchmark explorer ------------------------------------------------------

async function renderBenches(root) {
  root.appendChild(el("h2", { text: "Benchmark & dataset explorer" }));
  const loading = el("div", { class: "empty",
    text: "loading bench catalog (this decodes a few preview page images per bench)…" });
  root.appendChild(loading);
  const benches = await jget("/api/benchmarks");
  loading.remove();
  const cards = el("div", { class: "cards" });
  root.appendChild(cards);
  for (const b of benches) {
    const card = el("div", { class: "card" });
    card.appendChild(el("h3", { text: b.key }));
    const badges = el("div");
    badges.appendChild(el("span", { class: `badge tier-${b.tier}`, text: `tier ${b.tier}` }));
    badges.appendChild(el("span", { class: "badge", text: b.unit }));
    badges.appendChild(el("span", { class: "badge", text: b.provenance }));
    badges.appendChild(el("span", { class: "badge", text: b.license || "no license tag" }));
    badges.appendChild(el("span", { class: "badge", text: `scorer: ${b.scorer || "?"}` }));
    card.appendChild(badges);
    const countTxt = b.sample_count == null ? "unavailable (data not downloaded / bench refused)"
      : `${b.sample_count_exact ? "" : "≥"}${b.sample_count} samples`;
    card.appendChild(el("div", { class: "muted", style: "margin-top:0.4rem;", text: countTxt }));
    if (b.categories) card.appendChild(el("div", { class: "muted", text: `categories: ${b.categories.join(", ")}` }));
    if (b.load_error) card.appendChild(el("div", { class: "note", text: `load error: ${b.load_error}` }));
    if (b.gallery_allowed) {
      const gal = el("div", { class: "gallery" });
      card.appendChild(gal);
      loadGallery(b.key, gal);
    } else {
      card.appendChild(el("div", { class: "gated",
        text: `example gallery gated — license (${b.license || "unspecified"}) not on the redistribution allowlist; metadata only` }));
    }
    cards.appendChild(card);
  }
}

async function loadGallery(bench, container) {
  if (!state.runId) return;
  try {
    const g = await jget(`/api/benchmarks/${bench}/gallery?${qs({ n: 6, run_id: state.runId })}`);
    for (const item of g.items) {
      const img = el("img", { src: item.thumbnail_url, title: item.sample_id, loading: "lazy" });
      img.addEventListener("click", () => openExample("", bench));
      container.appendChild(img);
    }
  } catch (e) {
    container.appendChild(el("div", { class: "muted", text: "(no scored samples for gallery in this run)" }));
  }
}

// ---- Example review -----------------------------------------------------------

async function renderExample(root, params) {
  const picker = el("div", { class: "picker" });
  root.appendChild(picker);
  const resultBox = el("div");
  root.appendChild(resultBox);

  if (!state.runId) { resultBox.appendChild(el("div", { class: "empty", text: "no scored runs found" })); return; }

  const runInfo = state.runs.find(r => r.run_id === state.runId) || { models: [], benches: [] };
  const modelSel = el("select", { id: "ex-model" });
  modelSel.appendChild(el("option", { value: "", text: "(model)" }));
  for (const m of runInfo.models) modelSel.appendChild(el("option", { value: m, text: m }));
  const benchSel = el("select", { id: "ex-bench" });
  benchSel.appendChild(el("option", { value: "", text: "(bench)" }));
  for (const b of runInfo.benches) benchSel.appendChild(el("option", { value: b, text: b }));
  const sampleSel = el("select", { id: "ex-sample" });
  sampleSel.appendChild(el("option", { value: "", text: "(sample)" }));

  picker.appendChild(el("label", { text: "model" })); picker.appendChild(modelSel);
  picker.appendChild(el("label", { text: "bench" })); picker.appendChild(benchSel);
  picker.appendChild(el("label", { text: "sample" })); picker.appendChild(sampleSel);

  modelSel.value = params.model || "";
  benchSel.value = params.bench || "";

  async function refreshSamples() {
    sampleSel.innerHTML = "";
    sampleSel.appendChild(el("option", { value: "", text: "(sample)" }));
    if (!modelSel.value || !benchSel.value) return;
    const r = await jget(`/api/samples?${qs({ run_id: state.runId, model: modelSel.value, bench: benchSel.value })}`);
    for (const sid of r.sample_ids) sampleSel.appendChild(el("option", { value: sid, text: sid }));
    if (params.sample_id && r.sample_ids.includes(params.sample_id)) sampleSel.value = params.sample_id;
    else if (r.sample_ids.length) sampleSel.value = r.sample_ids[0];
    if (sampleSel.value) loadExample();
  }

  async function loadExample() {
    resultBox.innerHTML = "";
    if (!modelSel.value || !benchSel.value || !sampleSel.value) return;
    location.hash = `#/example?${qs({ run_id: state.runId, model: modelSel.value, bench: benchSel.value, sample_id: sampleSel.value })}`;
    let data;
    try {
      data = await jget(`/api/example?${qs({ run_id: state.runId, model: modelSel.value, bench: benchSel.value, sample_id: sampleSel.value })}`);
    } catch (e) {
      resultBox.appendChild(el("div", { class: "empty", text: `failed to load example: ${e.message}` }));
      return;
    }
    resultBox.appendChild(buildExamplePanels(data));
  }

  modelSel.addEventListener("change", refreshSamples);
  benchSel.addEventListener("change", refreshSamples);
  sampleSel.addEventListener("change", loadExample);

  if (modelSel.value && benchSel.value) await refreshSamples();
  else resultBox.appendChild(el("div", { class: "empty", text: "pick a model + bench (+ sample) above" }));
}

function buildExamplePanels(data) {
  const wrap = el("div");
  const badges = el("div", { style: "margin-bottom:0.75rem;" }, [
    el("span", { class: `badge tier-${data.tier}`, text: `tier ${data.tier || "?"}` }),
    el("span", { class: "badge", text: data.provenance || "?" }),
    el("span", { class: "badge", text: data.license || "no license tag" }),
    el("span", { class: "badge", text: `category: ${data.category || "?"}` }),
  ]);
  wrap.appendChild(badges);
  if (data.error) wrap.appendChild(el("div", { class: "gated", text: `error on this sample: ${data.error}` }));

  const grid = el("div", { class: "example-grid" });
  wrap.appendChild(grid);

  const left = el("div", { class: "panel" });
  left.appendChild(el("h3", { text: "page image" }));
  left.appendChild(el("img", { src: data.image_url, alt: data.sample_id }));
  grid.appendChild(left);

  const right = el("div", { class: "panel" });
  right.appendChild(el("h3", { text: "extracted markdown vs. ground truth" }));
  right.appendChild(el("div", { class: "muted", text: "model prediction" }));
  right.appendChild(el("pre", { text: extractMarkdown(data.prediction) }));
  right.appendChild(el("div", { class: "muted", style: "margin-top:0.6rem;", text: "ground truth" }));
  right.appendChild(renderGold(data.gold));
  grid.appendChild(right);

  wrap.appendChild(el("h3", { style: "margin-top:1.2rem;", text: "score record" }));
  wrap.appendChild(renderMetrics(data.metrics));
  return wrap;
}

function extractMarkdown(pred) {
  if (!pred) return "(no prediction record)";
  const p = pred.prediction;
  if (p == null) return `(kind=${pred.kind}, no prediction body — error: ${pred.error || "?"})`;
  if (Array.isArray(p)) return p.map((x, i) => `--- page ${i} ---\n${x.markdown || JSON.stringify(x)}`).join("\n\n");
  if (typeof p === "object") return p.markdown != null ? p.markdown : JSON.stringify(p, null, 2);
  return String(p);
}

function renderGold(gold) {
  const box = el("div");
  if (!gold) { box.appendChild(el("pre", { text: "(no gold)" })); return box; }
  if (gold.kind === "qa") {
    box.appendChild(el("div", { class: "qa-row" }, [el("b", { text: "question: " }), document.createTextNode(gold.question || "?")]));
    box.appendChild(el("div", { class: "qa-row" }, [el("b", { text: "accepted answers: " }), document.createTextNode((gold.answers || []).join(" | "))]));
  } else if (gold.kind === "page_annotation") {
    box.appendChild(el("pre", { text: gold.reconstructed_text || "(none matched)" }));
  } else if (gold.kind === "unit_tests") {
    if (!gold.tests.length) box.appendChild(el("div", { class: "muted", text: "(no matching tests found)" }));
    for (const t of gold.tests) {
      const row = el("div", { class: "test-row" });
      row.appendChild(el("span", { class: t.passed === false ? "fail" : (t.passed ? "pass" : ""), text: t.passed === false ? "✗" : (t.passed ? "✓" : "?") }));
      row.appendChild(el("span", { class: "tag", text: t.type }));
      row.appendChild(document.createTextNode(t.assertion || ""));
      if (t.fail_reason) row.appendChild(el("span", { class: "muted", text: ` — ${t.fail_reason}` }));
      box.appendChild(row);
    }
  } else if (gold.kind === "segmentation") {
    box.appendChild(el("div", { text: `gold boundaries: [${(gold.boundaries || []).join(", ")}] over ${gold.n_pages} pages` }));
  } else {
    box.appendChild(el("pre", { text: JSON.stringify(gold, null, 2) }));
  }
  if (gold.note) box.appendChild(el("div", { class: "note", text: gold.note }));
  return box;
}

function renderMetrics(metrics) {
  if (!metrics) return el("div", { class: "muted", text: "(no score record)" });
  const t = el("table", { class: "metrics-table" });
  for (const [k, v] of Object.entries(metrics)) {
    if (v == null) continue;
    t.appendChild(el("tr", {}, [
      el("th", { text: k }),
      el("td", { text: typeof v === "object" ? JSON.stringify(v) : String(v) }),
    ]));
  }
  return t;
}

// ---- router --------------------------------------------------------------

async function route() {
  const { path, params } = parseHash();
  for (const a of document.querySelectorAll("#nav a")) a.classList.toggle("active", a.dataset.route === path);
  const root = document.getElementById("app");
  root.innerHTML = "";
  try {
    if (path === "/benches") await renderBenches(root);
    else if (path === "/example") await renderExample(root, params);
    else await renderLeaderboard(root);
  } catch (e) {
    root.appendChild(el("div", { class: "empty", text: `error: ${e.message}` }));
  }
}

window.addEventListener("hashchange", route);
(async function init() {
  await loadRuns();
  route();
})();
</script>
</body>
</html>
